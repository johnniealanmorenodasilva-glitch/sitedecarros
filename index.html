<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exotic Garage | Catálogo de Veículos Premium</title>
    <meta name="description" content="Catálogo digital de veículos de alta performance e luxo. Confira nossas máquinas exclusivas.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>

    <header>
        <div class="logo">EXOTIC<span>GARAGE</span></div>
        <nav>
            <a href="#">Catálogo</a>
            <a href="#">Sobre Nós</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Descubra o <span>Extraordinário</span></h1>
            <p>Selecione um dos nossos modelos exclusivos abaixo para explorar suas especificações em detalhes.</p>
        </section>

        <section class="catalog" id="catalog-grid">
            <!-- Cards will be injected here via JS -->
        </section>
    </main>

    <!-- Modal for specifications -->
    <div class="modal-overlay" id="specs-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal">&times;</button>
            <div class="modal-body" id="modal-body">
                <!-- Modal content injected via JS -->
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Exotic Garage. Todos os direitos reservados.</p>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
